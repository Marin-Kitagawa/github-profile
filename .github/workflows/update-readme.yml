name: Update README Activity

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update GitHub Activity in README
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Wraps activity between these HTML comment markers in your README:
          #   <!--START_SECTION:activity-->
          #   <!--END_SECTION:activity-->
          COMMIT_MSG: "chore: update activity feed"
          MAX_LINES: 10

      - name: Update WakaTime stats in README
        uses: anmol098/waka-readme-stats@master
        # Only runs if WAKATIME_API_KEY secret is set
        if: ${{ secrets.WAKATIME_API_KEY != '' }}
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Wraps stats between these markers:
          #   <!--START_SECTION:waka-->
          #   <!--END_SECTION:waka-->
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_PROJECTS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_LOC_CHART: "False"
